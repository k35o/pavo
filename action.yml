name: Pavo
description: 'AI PR review and inline-comment reply via Claude Code'

inputs:
  github_token:
    description: 'GitHub token used for posting reviews. Typically from actions/create-github-app-token.'
    required: true
  app_slug:
    description: 'GitHub App slug (without [bot] suffix). Use steps.app-token.outputs.app-slug from actions/create-github-app-token.'
    required: true
  claude_code_oauth_token:
    description: 'Claude Code Max OAuth token (claude setup-token).'
    required: true
  instructions:
    description: 'Comma-separated instruction names. Dependencies are resolved from instructions/index.json. Entries starting with ./ are read from the target repo.'
    required: false
    default: 'default'
  extra_prompt:
    description: 'Repo-specific additional context appended to the prompt.'
    required: false
  skip_label:
    description: 'PR label that disables this action.'
    required: false
    default: 'pavo:skip'
  model:
    description: 'Claude model for reviews. A pavo:deep PR label overrides this to opus.'
    required: false
    default: 'sonnet'
  language:
    description: 'Review output language: auto (follow the PR description), ja, or en.'
    required: false
    default: 'auto'
  approve:
    description: 'Allow posting event: APPROVE reviews. Set false to always use COMMENT.'
    required: false
    default: 'true'
  min_severity:
    description: 'Lowest severity posted as an inline comment (suggestion|warning|critical). Findings below it are collapsed into the review body.'
    required: false
    default: 'suggestion'
  ignore_paths:
    description: 'Comma-separated globs excluded from review, added to the built-in lockfile/generated-file defaults.'
    required: false
  allow_bots:
    description: 'Comma-separated bot logins (with or without [bot]) whose PRs should be reviewed. Empty = skip all bot-triggered events.'
    required: false
  review_drafts:
    description: 'Review draft PRs too. By default drafts are skipped until ready_for_review.'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    # All trigger/config logic lives in gate.ts so it is unit-testable.
    # Repo-side .github/pavo.json (if any) is merged over the inputs here.
    - id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        APP_SLUG: ${{ inputs.app_slug }}
        SKIP_LABEL: ${{ inputs.skip_label }}
        INSTRUCTIONS: ${{ inputs.instructions }}
        EXTRA_PROMPT: ${{ inputs.extra_prompt }}
        MODEL: ${{ inputs.model }}
        LANGUAGE: ${{ inputs.language }}
        APPROVE: ${{ inputs.approve }}
        MIN_SEVERITY: ${{ inputs.min_severity }}
        IGNORE_PATHS: ${{ inputs.ignore_paths }}
        ALLOW_BOTS: ${{ inputs.allow_bots }}
        REVIEW_DRAFTS: ${{ inputs.review_drafts }}
        OUT_DIR: ${{ runner.temp }}/pavo
      run: |
        set -euo pipefail
        node "${GITHUB_ACTION_PATH}/scripts/gate.ts"

    # Fail fast with actionable errors before burning a Claude session:
    # a missing App installation otherwise surfaces as a 403 on the very
    # last POST, after the whole review has been generated.
    - id: bot
      if: steps.gate.outputs.mode != 'skip'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        APP_SLUG: ${{ inputs.app_slug }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
      run: |
        set -euo pipefail
        name="${APP_SLUG}[bot]"
        if ! id=$(gh api "/users/${name}" --jq .id); then
          echo "::error::GitHub App user ${name} not found. app_slug の綴りを確認してください。"
          exit 1
        fi
        if ! gh api "repos/${REPO}" --jq .id > /dev/null; then
          echo "::error::App token cannot read ${REPO}. GitHub App がこのリポジトリにインストールされているか確認してください。"
          exit 1
        fi
        if ! gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq .id > /dev/null; then
          echo "::error::App token cannot read PR #${PR_NUMBER}. App の Repository permissions（Pull requests: Read & write）を確認してください。"
          exit 1
        fi
        echo "name=${name}" >> "$GITHUB_OUTPUT"
        echo "id=${id}" >> "$GITHUB_OUTPUT"

    # The claude_args block is the security boundary for both Claude
    # invocations (read-only tools, .git/ deny, no PR-side settings), so it is
    # defined exactly once. MODEL comes from gate so the pavo:deep label
    # override applies. --setting-sources user: never load .claude/settings.json
    # (hooks) from the checked-out PR. Read/Grep are denied on .git/ because
    # claude-code-action configures git auth with the App token in .git/config.
    # The allowlist has no write or gh-api tools; posting is done by Pavo's
    # scripts.
    - id: claude-args
      if: steps.gate.outputs.mode != 'skip'
      shell: bash
      env:
        MODE: ${{ steps.gate.outputs.mode }}
        MODEL: ${{ steps.gate.outputs.model }}
      run: |
        set -euo pipefail
        case "${MODE}" in
          review) max_turns=60 schema=review.json ;;
          convo) max_turns=30 schema=reply.json ;;
          *) echo "::error::unexpected mode ${MODE}"; exit 1 ;;
        esac
        delim="PAVO_ARGS_$(openssl rand -hex 16)"
        {
          echo "claude_args<<${delim}"
          echo "--model ${MODEL}"
          echo "--max-turns ${max_turns}"
          echo "--setting-sources user"
          echo "--allowedTools \"Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*)\""
          echo "--disallowedTools \"Read(./.git/**),Grep(./.git/**)\""
          echo "--json-schema '$(jq -c . "${GITHUB_ACTION_PATH}/scripts/schemas/${schema}")'"
          echo "${delim}"
        } >> "$GITHUB_OUTPUT"

    # The head commit (not the transient merge ref): what `gh pr diff` shows,
    # what Read sees, and what inline comment anchors refer to must all be the
    # same commit. persist-credentials:false keeps the checkout token out of
    # .git/config; claude-code-action still writes its own git auth there, so
    # the claude steps below additionally deny Read on .git/.
    - if: steps.gate.outputs.mode != 'skip'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ steps.gate.outputs.head_sha }}
        fetch-depth: 1
        persist-credentials: false

    # ===== review path =====

    - id: context
      if: steps.gate.outputs.mode == 'review'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
        BOT_NAME: ${{ steps.bot.outputs.name }}
        HEAD_SHA: ${{ steps.gate.outputs.head_sha }}
        OUT_DIR: ${{ runner.temp }}/pavo
      run: |
        set -euo pipefail
        node "${GITHUB_ACTION_PATH}/scripts/collect-context.ts"

    - id: review-prompt
      if: steps.gate.outputs.mode == 'review'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        CONFIG: ${{ steps.gate.outputs.config }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
        PR_TITLE: ${{ steps.gate.outputs.pr_title }}
        PR_BODY: ${{ steps.gate.outputs.pr_body }}
        HEAD_SHA: ${{ steps.gate.outputs.head_sha }}
        CONTEXT_FILE: ${{ steps.context.outputs.context_file }}
        ON_DEMAND: ${{ steps.gate.outputs.on_demand }}
        REPO_CONTEXT_FILE: ${{ steps.gate.outputs.repo_context_file }}
        LEARNINGS_FILE: ${{ steps.gate.outputs.learnings_file }}
      run: |
        set -euo pipefail
        node "${GITHUB_ACTION_PATH}/scripts/build-review-prompt.ts"

    - id: claude-review
      if: steps.gate.outputs.mode == 'review'
      uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1.0.176
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        github_token: ${{ inputs.github_token }}
        bot_id: ${{ steps.bot.outputs.id }}
        bot_name: ${{ steps.bot.outputs.name }}
        allowed_bots: ${{ inputs.allow_bots }}
        prompt: ${{ steps.review-prompt.outputs.prompt }}
        claude_args: ${{ steps.claude-args.outputs.claude_args }}

    - if: steps.gate.outputs.mode == 'review'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
        HEAD_SHA: ${{ steps.gate.outputs.head_sha }}
        BOT_NAME: ${{ steps.bot.outputs.name }}
        CONFIG: ${{ steps.gate.outputs.config }}
        STRUCTURED_OUTPUT: ${{ steps.claude-review.outputs.structured_output }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        PAVO_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        node "${GITHUB_ACTION_PATH}/scripts/post-review.ts"

    # ===== conversation path =====

    - id: convo-prompt
      if: steps.gate.outputs.mode == 'convo'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        ACTION_PATH: ${{ github.action_path }}
        CONFIG: ${{ steps.gate.outputs.config }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
        PR_TITLE: ${{ steps.gate.outputs.pr_title }}
        PR_BODY: ${{ steps.gate.outputs.pr_body }}
        ROOT_ID: ${{ steps.gate.outputs.root_id }}
        BOT_NAME: ${{ steps.bot.outputs.name }}
        REPO_CONTEXT_FILE: ${{ steps.gate.outputs.repo_context_file }}
      run: |
        set -euo pipefail
        node "${GITHUB_ACTION_PATH}/scripts/build-conversation-prompt.ts"

    - id: claude-convo
      if: steps.gate.outputs.mode == 'convo' && steps.convo-prompt.outputs.skip == 'false'
      uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1.0.176
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        github_token: ${{ inputs.github_token }}
        bot_id: ${{ steps.bot.outputs.id }}
        bot_name: ${{ steps.bot.outputs.name }}
        allowed_bots: ${{ inputs.allow_bots }}
        prompt: ${{ steps.convo-prompt.outputs.prompt }}
        claude_args: ${{ steps.claude-args.outputs.claude_args }}

    - if: steps.gate.outputs.mode == 'convo' && steps.convo-prompt.outputs.skip == 'false'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
        ROOT_ID: ${{ steps.gate.outputs.root_id }}
        BOT_NAME: ${{ steps.bot.outputs.name }}
        STRUCTURED_OUTPUT: ${{ steps.claude-convo.outputs.structured_output }}
      run: |
        set -euo pipefail
        node "${GITHUB_ACTION_PATH}/scripts/post-reply.ts"

    # ===== failure notification =====

    # A red Actions badge is easy to miss in solo operation; leave a trace on
    # the PR itself. `|| true` — never mask the original failure.
    - if: failure() && steps.gate.outputs.mode != 'skip' && steps.gate.outputs.pr_number != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -euo pipefail
        jq -n --arg body "⚠️ Pavo の実行が失敗しました: ${RUN_URL}" '{body: $body}' \
          | gh api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" --input - || true
