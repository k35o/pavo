name: Pavo
description: 'AI PR review and inline-comment reply via Claude Code'

inputs:
  github_token:
    description: 'GitHub token used for posting reviews. Typically from actions/create-github-app-token.'
    required: true
  app_slug:
    description: 'GitHub App slug (without [bot] suffix). Use steps.app-token.outputs.app-slug from actions/create-github-app-token.'
    required: true
  claude_code_oauth_token:
    description: 'Claude Code Max OAuth token (claude setup-token).'
    required: true
  instructions:
    description: 'Comma-separated instruction names. Dependencies are resolved from instructions/index.json.'
    required: false
    default: 'default'
  extra_prompt:
    description: 'Repo-specific additional context appended to the prompt.'
    required: false
  skip_label:
    description: 'PR label that disables this action.'
    required: false
    default: 'pavo:skip'

runs:
  using: composite
  steps:
    - id: gate
      shell: bash
      env:
        SKIP_LABEL_PRESENT: ${{ contains(github.event.pull_request.labels.*.name, inputs.skip_label) }}
        EVENT_NAME: ${{ github.event_name }}
        SENDER_TYPE: ${{ github.event.sender.type }}
        IN_REPLY_TO_ID: ${{ github.event.comment.in_reply_to_id }}
      run: |
        set -euo pipefail
        review=false
        convo=false
        if [ "${SKIP_LABEL_PRESENT}" = "false" ]; then
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            review=true
          elif [ "${EVENT_NAME}" = "pull_request_review_comment" ] \
            && [ "${SENDER_TYPE}" != "Bot" ] \
            && [ -n "${IN_REPLY_TO_ID}" ]; then
            convo=true
          fi
        fi
        if [ "${review}" = "false" ] && [ "${convo}" = "false" ]; then
          echo "::notice::Pavo skipped (event=${EVENT_NAME}, skip_label_present=${SKIP_LABEL_PRESENT})"
        fi
        echo "review=${review}" >> "$GITHUB_OUTPUT"
        echo "convo=${convo}" >> "$GITHUB_OUTPUT"

    - id: bot
      if: steps.gate.outputs.review == 'true' || steps.gate.outputs.convo == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        APP_SLUG: ${{ inputs.app_slug }}
      run: |
        set -euo pipefail
        name="${APP_SLUG}[bot]"
        id=$(gh api "/users/${name}" --jq .id)
        echo "name=${name}" >> "$GITHUB_OUTPUT"
        echo "id=${id}" >> "$GITHUB_OUTPUT"

    # ===== review path =====

    - if: steps.gate.outputs.review == 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - id: existing
      if: steps.gate.outputs.review == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        BOT_NAME: ${{ steps.bot.outputs.name }}
      run: |
        set -euo pipefail
        inline=$(gh api --paginate "/repos/${REPO}/pulls/${PR_NUMBER}/comments" \
          | jq --arg bot "${BOT_NAME}" \
              '[.[] | select(.user.login == $bot) | {path, line, body}]')
        reviews=$(gh api --paginate "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
          | jq --arg bot "${BOT_NAME}" \
              '[.[] | select(.user.login == $bot and (.body | length) > 0) | {body}]')
        issue=$(gh api --paginate "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
          | jq --arg bot "${BOT_NAME}" \
              '[.[] | select(.user.login == $bot) | {body}]')
        delim="EXISTING_$(date +%s%N)"
        {
          echo "summary<<${delim}"
          echo "### inline comments"
          echo "${inline}"
          echo "### review summaries"
          echo "${reviews}"
          echo "### legacy PR-level comments"
          echo "${issue}"
          echo "${delim}"
        } >> "$GITHUB_OUTPUT"

    - id: review-prompt
      if: steps.gate.outputs.review == 'true'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        INSTRUCTIONS: ${{ inputs.instructions }}
        EXTRA_PROMPT: ${{ inputs.extra_prompt }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_BODY: ${{ github.event.pull_request.body }}
        EXISTING: ${{ steps.existing.outputs.summary }}
      run: |
        set -euo pipefail
        delim="PAVO_PROMPT_$(date +%s%N)"
        {
          echo "prompt<<${delim}"
          node "${ACTION_PATH}/scripts/build-review-prompt.mjs"
          echo
          echo "${delim}"
        } >> "$GITHUB_OUTPUT"

    - if: steps.gate.outputs.review == 'true'
      uses: anthropics/claude-code-action@939ae9c056ecf8a1a01409ddd1c4eadec5f8c77b # v1.0.116
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        github_token: ${{ inputs.github_token }}
        bot_id: ${{ steps.bot.outputs.id }}
        bot_name: ${{ steps.bot.outputs.name }}
        prompt: ${{ steps.review-prompt.outputs.prompt }}
        claude_args: |
          --model sonnet
          --allowedTools "Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)"

    # ===== conversation path =====

    - id: thread
      if: steps.gate.outputs.convo == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        ROOT_ID: ${{ github.event.comment.in_reply_to_id }}
        BOT_NAME: ${{ steps.bot.outputs.name }}
      run: |
        set -euo pipefail
        root=$(gh api "/repos/${REPO}/pulls/comments/${ROOT_ID}")
        user=$(echo "${root}" | jq -r .user.login)
        if [ "${user}" != "${BOT_NAME}" ]; then
          echo "::notice::Thread root by ${user}, not ${BOT_NAME}; skipping reply."
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - if: steps.thread.outputs.skip == 'false'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 1

    - id: convo-prompt
      if: steps.thread.outputs.skip == 'false'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        ACTION_PATH: ${{ github.action_path }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_BODY: ${{ github.event.pull_request.body }}
        ROOT_ID: ${{ github.event.comment.in_reply_to_id }}
        FILE_PATH: ${{ github.event.comment.path }}
      run: |
        set -euo pipefail
        THREAD_JSON=$(gh api --paginate "/repos/${REPO}/pulls/${PR_NUMBER}/comments" \
          | jq --argjson rid "${ROOT_ID}" \
              '[.[] | select(.id == $rid or .in_reply_to_id == $rid)] | sort_by(.id)')
        export THREAD_JSON
        delim="CONVO_PROMPT_$(date +%s%N)"
        {
          echo "prompt<<${delim}"
          node "${ACTION_PATH}/scripts/build-conversation-prompt.mjs"
          echo
          echo "${delim}"
        } >> "$GITHUB_OUTPUT"

    - if: steps.thread.outputs.skip == 'false'
      uses: anthropics/claude-code-action@939ae9c056ecf8a1a01409ddd1c4eadec5f8c77b # v1.0.116
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        github_token: ${{ inputs.github_token }}
        bot_id: ${{ steps.bot.outputs.id }}
        bot_name: ${{ steps.bot.outputs.name }}
        prompt: ${{ steps.convo-prompt.outputs.prompt }}
        claude_args: |
          --model sonnet
          --allowedTools "Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)"
