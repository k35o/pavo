# The App key and Claude OAuth token are shared by every caller repo, so an
# expired credential silently kills reviews fleet-wide. This monthly probe
# fails loudly (files an issue) before that happens in the field.
name: Credential check

on:
  schedule:
    - cron: '17 0 1 * *' # 1st of each month 00:17 UTC = 09:17 JST
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.K35O_BOT_CLIENT_ID }}
          private-key: ${{ secrets.K35O_BOT_PRIVATE_KEY }}

      - name: Verify App installation access
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          count=$(gh api /installation/repositories --jq .total_count)
          echo "App token OK: ${count} repositories accessible"

      - name: Verify Claude OAuth token
        uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1.0.176
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: 'Reply with the single word: ok'
          claude_args: |
            --model haiku
            --max-turns 3

      - name: File an issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Pavo credential check failed ($(date +%Y-%m))" \
            --body "月次のクレデンシャル疎通確認が失敗しました。CLAUDE_CODE_OAUTH_TOKEN の期限切れ、または GitHub App の秘密鍵・インストール状態を確認してください。実行ログ: ${RUN_URL}"
