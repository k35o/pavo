# Weekly feedback loop: how many Pavo findings got resolved / reacted to.
# The numbers are the evidence base for tuning instructions/*.md.
# For other repos, run scripts/report-metrics.mjs manually with REPO/BOT_NAME.
name: Metrics

on:
  schedule:
    - cron: '43 21 * * 4' # Thursday 21:43 UTC = Friday 06:43 JST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.K35O_BOT_CLIENT_ID }}
          private-key: ${{ secrets.K35O_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          BOT_NAME: ${{ steps.app-token.outputs.app-slug }}[bot]
        run: |
          set -euo pipefail
          node scripts/report-metrics.mjs
