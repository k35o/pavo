name: Pavo

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

# Same-PR pushes cancel earlier in-flight reviews so only the latest commit gets reviewed.
# Group also includes event_name so review jobs and reply jobs don't cancel each other —
# without this, Pavo posting a review triggers a review_comment event whose run cancels
# the post-cleanup of the run that just finished, surfacing a false "cancelled" badge.
concurrency:
  group: pavo-${{ github.event_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pavo:
    # Skip on PRs from forks: secrets are not exposed to fork workflows so the App
    # token step would fail anyway, and we don't want a permanent red Actions run.
    if: ${{ github.event.pull_request.head.repo.fork != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.K35O_BOT_CLIENT_ID }}
          private-key: ${{ secrets.K35O_BOT_PRIVATE_KEY }}

      # `uses: ./` requires the repo (i.e. action.yml) to be on the workspace.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: ./
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          app_slug: ${{ steps.app-token.outputs.app-slug }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          instructions: default
          extra_prompt: |
            Pavo 自身のリポジトリです。GitHub composite action と AI レビュー観点をまとめた Markdown で構成されています。
            - `action.yml` の YAML 構文・step 条件・secret/token の扱い
            - `instructions/*.md` のレビュー観点としての一貫性・抜け漏れ
            - `instructions/index.json` の依存関係定義
            を中心に確認してください。
