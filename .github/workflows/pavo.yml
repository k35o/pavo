name: Pavo

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

jobs:
  pavo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.K35O_BOT_CLIENT_ID }}
          private-key: ${{ secrets.K35O_BOT_PRIVATE_KEY }}

      - uses: ./
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          app_slug: ${{ steps.app-token.outputs.app-slug }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          instructions: default
          extra_prompt: |
            Pavo 自身のリポジトリです。GitHub composite action と AI レビュー観点をまとめた Markdown で構成されています。
            - `action.yml` の YAML 構文・step 条件・secret/token の扱い
            - `instructions/*.md` のレビュー観点としての一貫性・抜け漏れ
            - `instructions/index.json` の依存関係定義
            を中心に確認してください。
