# Dogfooding: Pavo's own PRs are reviewed by Pavo.
#
# Deliberately `@main`, not `uses: ./` — a PR that edits action.yml or
# instructions/ must be reviewed by the *current* Pavo, not by the modified
# version it is trying to introduce (otherwise a PR could weaken the reviewer
# and then get approved by its own weakened rules). The PR version is
# exercised by ci.yml instead.
name: Pavo

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  pavo:
    # Cheap pre-filter so ordinary PR comments don't spin up a runner just to
    # be skipped by the gate.
    if: ${{ github.event_name != 'issue_comment' || startsWith(github.event.comment.body, '/pavo') }}
    uses: k35o/pavo/.github/workflows/review.yml@main
    with:
      instructions: default,github-actions,node
      # Renovate PRs (mainly claude-code-action bumps) get reviewed too — the
      # dogfood review doubles as the pre-merge sanity signal for upstream bumps.
      allow_bots: renovate
      extra_prompt: |
        Pavo 自身のリポジトリです。GitHub composite action と AI レビュー観点 Markdown、
        プロンプト生成・レビュー投稿用の Node.js スクリプトで構成されています。
        - `action.yml` の step 条件・secret/token の扱い
        - `scripts/*.mjs` の堅牢性（gh 呼び出しの失敗処理、エスケープ、境界値）
        - `instructions/*.md` のレビュー観点としての一貫性・抜け漏れ
        - `instructions/index.json` の依存関係定義
        を中心に確認してください。
    secrets: inherit
