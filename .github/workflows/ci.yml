# Pavo is consumed at @main by every caller, so a broken merge takes down all
# reviews at once. This suite is the pre-merge safety net: instruction graph
# integrity, prompt builders producing sane output for every combination, and
# the pure logic in gate/post scripts.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: node --test 'tests/*.test.mjs'
