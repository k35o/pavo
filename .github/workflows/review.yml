# Reusable caller: wraps the job-level boilerplate (concurrency, fork skip,
# timeout, permissions, App token minting) so target repos need only a few
# lines and fleet-wide fixes land here once instead of in N copied workflows.
#
# Caller example:
#   jobs:
#     pavo:
#       if: ${{ github.event_name != 'issue_comment' || startsWith(github.event.comment.body, '/pavo') }}
#       uses: k35o/pavo/.github/workflows/review.yml@main
#       with:
#         instructions: default,nextjs
#       secrets: inherit
#
# Expects org/repo secrets: K35O_BOT_CLIENT_ID, K35O_BOT_PRIVATE_KEY,
# CLAUDE_CODE_OAUTH_TOKEN (use `secrets: inherit`).
name: Pavo Review

on:
  workflow_call:
    inputs:
      instructions:
        type: string
        default: 'default'
      extra_prompt:
        type: string
        default: ''
      skip_label:
        type: string
        default: 'pavo:skip'
      model:
        type: string
        default: 'sonnet'
      language:
        type: string
        default: 'auto'
      approve:
        type: string
        default: 'true'
      min_severity:
        type: string
        default: 'suggestion'
      ignore_paths:
        type: string
        default: ''
      allow_bots:
        type: string
        default: ''
      review_drafts:
        type: string
        default: 'false'

jobs:
  pavo:
    # Cross-repository (true fork) PRs cannot see secrets, so the App token
    # step would fail anyway. head.repo.fork is NOT this check: it is true for
    # every in-repo PR on a repository that is itself a fork.
    if: ${{ github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only checkout needs the workflow token; every GitHub write (review,
    # reply, dismiss, resolve) goes through the App installation token. Keeping
    # this at contents:read means callers with restricted default permissions
    # need no explicit grant.
    permissions:
      contents: read
    # Same-PR pushes cancel earlier in-flight reviews so only the latest commit
    # is reviewed. comment.id keeps each reply/command run in its own group —
    # without it, two quick replies cancel each other and the first is lost.
    concurrency:
      group: pavo-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event.comment.id || 'pr' }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    env:
      # Org-level kill switch: set the PAVO_DISABLED variable to 'true' to stop
      # every Pavo run at the gate (e.g. while rolling back a bad change).
      PAVO_DISABLED: ${{ vars.PAVO_DISABLED || 'false' }}
    steps:
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.K35O_BOT_CLIENT_ID }}
          private-key: ${{ secrets.K35O_BOT_PRIVATE_KEY }}

      - uses: k35o/pavo@main
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          app_slug: ${{ steps.app-token.outputs.app-slug }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          instructions: ${{ inputs.instructions }}
          extra_prompt: ${{ inputs.extra_prompt }}
          skip_label: ${{ inputs.skip_label }}
          model: ${{ inputs.model }}
          language: ${{ inputs.language }}
          approve: ${{ inputs.approve }}
          min_severity: ${{ inputs.min_severity }}
          ignore_paths: ${{ inputs.ignore_paths }}
          allow_bots: ${{ inputs.allow_bots }}
          review_drafts: ${{ inputs.review_drafts }}
